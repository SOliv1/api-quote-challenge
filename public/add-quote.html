<html lang="en">
  <head>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Cinematic Quotations" />

      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=3" />
    <!-- Cinematic Quotations Favicons -->
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/favicon-16.png?v=3"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/favicon-32.png?v=3"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="64x64"
      href="/favicon-64.png?v=3"
    />

      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/favicon-dark-16.png?v=3"
      media="(prefers-color-scheme: dark)"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/favicon-dark-32.png?v=3"
      media="(prefers-color-scheme: dark)"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="64x64"

      rel="apple-touch-icon"
      sizes="512x512"

      media="(prefers-color-scheme: dark)"

    <meta name="theme-color" content="#6a00f4" />

  <body class="add-quote-page">
    <main class="add-quote-shell">
      <section class="quote-form-column">
        <h1>Cinematic Quotations</h1>

        <nav>
          <a href="index.html">Home</a>
          <a href="add-quote.html">Add a New Quote</a>
        </nav>

        <div class="quote-form">
          <h2>Add a New Quote</h2>

          <div class="inputs">
            <label for="quote">Quote text:</label>
            <input id="quote" value="" />

            <label for="person">Person:</label>
            <input id="person" value="" />
          </div>

          <button id="submit-quote">Submit Your Quote</button>
        </div>

        <div id="new-quote"></div>
      </section>

      <aside class="decorative-q" aria-hidden="true"></aside>
    </main>

    <script src="js/add-quote.js"></script>
  </body>
</html>
