<!doctype html>
<html lang="en">
  <head>
    <title>Cinematic Quotations</title>
    <link
      href="https://fonts.googleapis.com/css?family=Nunito+Sans:400,400i,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
    <link rel="icon" type="image/png" sizes="64x64" href="favicon-64.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="favicon-512.png" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
  </head>

  <body class="add-quote-page">
    <main class="add-quote-shell">
      <section class="quote-form-column">
        <h1>Cinematic Quotations</h1>

        <nav>
          <a href="index.html">Home</a>
          <a href="add-quote.html">Add a New Quote</a>
        </nav>

        <div class="quote-form">
          <h2>Add a New Quote</h2>

          <div class="inputs">
            <label for="quote">Quote text:</label>
            <input id="quote" value="" />

            <label for="person">Person:</label>
            <input id="person" value="" />
          </div>

          <button id="submit-quote">Submit Your Quote</button>
        </div>

        <div id="new-quote"></div>
      </section>

      <aside class="decorative-q" aria-hidden="true"></aside>
    </main>

    <script src="js/add-quote.js"></script>
  </body>
</html>
