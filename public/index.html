<!doctype html>

<html lang="en">
  <head>
    <title>Cinematic Quotations</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Cinematic Quotations" />
    <link rel="manifest" href="/site.webmanifest?v=1" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=3" />
    <!-- Cinematic Quotations Favicons -->
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/favicon-16.png?v=3"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/favicon-32.png?v=3"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="64x64"
      href="/favicon-64.png?v=3"
    />
    <link rel="apple-touch-icon" sizes="512x512" href="/favicon-512.png?v=3" />

    <!-- Dark Mode Favicons -->
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/favicon-dark-16.png?v=3"
      media="(prefers-color-scheme: dark)"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/favicon-dark-32.png?v=3"
      media="(prefers-color-scheme: dark)"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="64x64"
      href="/favicon-dark-64.png?v=3"
      media="(prefers-color-scheme: dark)"
    />
    <link
      rel="apple-touch-icon"
      sizes="512x512"
      href="/favicon-dark-512.png?v=3"
      media="(prefers-color-scheme: dark)"
    />

    <meta name="theme-color" content="#6a00f4" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico?v=3" />
    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico?v=3" />
  </head>
  <body class="home-page">
    <div id="splash" role="status" aria-live="polite">
      <img src="images/cinematic-icon.png" alt="Cinematic Quotations logo" />
    </div>

    <main class="home-shell" hidden>
      <section class="quote-form-column">
        <h1>Cinematic Quotations</h1>
        <h2>A Home for Words That Stay</h2>

        <nav>
          <a href="index.html">Home</a>
          <a href="add-quote.html">Add a New Quote</a>
        </nav>

        <div class="home-copy">
          <h2>Get Quotes</h2>
          <p>Fetch a single quote, toggle categories, or explore by author.</p>
        </div>

        <!-- NEW: Single Quote Viewer -->
        <section id="quote-viewer" class="results-panel">
          <h2>Quote</h2>
          <p id="quote-text" class="fade"></p>
          <p id="quote-person" class="fade"></p>

          <div class="action-stack inline-actions">
            <button id="toggle-category">Category: Cinematic</button>
            <button id="next-quote">Next Quote</button>
          </div>
        </section>

        <!-- NEW: Author Filter (kept, but simplified) -->
        <div class="home-controls">
          <div class="control-group">
            <h3>Filter by Author</h3>
            <label for="author">Author name</label>
            <input id="author" value="" placeholder="Lucille Ball" />
            <button id="fetch-by-author">Fetch by Author</button>
          </div>
        </div>
      </section>

      <aside class="decorative-q" aria-hidden="true"></aside>
    </main>

    <script src="js/script.js"></script>
  </body>
</html>
